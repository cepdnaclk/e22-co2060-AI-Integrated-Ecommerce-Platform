services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-learning-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongodb:
    image: mongo:7
    container_name: rag-learning-mongodb
    ports:
      - "27018:27017"
    volumes:
      - rag_learning_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  rag_learning_mongo_data:
