server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for Railway internal networking
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        # Using the exact service name shown in your Railway dashboard:
        # "e22-co2060-ai-integrated-ecommerce-platform"
        set $backend_upstream "http://e22-co2060-ai-integrated-ecommerce-platform.railway.internal:8080";

        proxy_pass $backend_upstream/api/;
        
        # DEBUG: See which address Nginx is actually using in the browser Network tab
        add_header X-Debug-Backend-Url $backend_upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Auth $http_authorization;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        
        # Timeouts for Railway backend response
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        # Allow Firebase Auth popups to communicate back to the site
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    }
}

