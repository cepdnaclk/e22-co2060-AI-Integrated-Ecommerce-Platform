server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Removed the failing 127.0.0.11 resolver. 
    # Nginx will now use the system's default DNS provided by Railway.

    location /api/ {
        # Using the direct address in proxy_pass for maximum stability.
        # This ensures Nginx resolves the address at startup.
        proxy_pass http://e22-co2060-ai-integrated-ecommerce-platform.railway.internal:8080/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Host e22-co2060-ai-integrated-ecommerce-platform.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Auth $http_authorization;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        
        # Timeouts for Railway backend response
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        # Allow Firebase Auth popups to communicate back to the site
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    }
}
