server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for Railway internal networking
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        # Using a variable for the backend URL prevents Nginx from crashing 
        # if the hostname cannot be resolved at startup.
        set $backend_upstream "http://backend.railway.internal:3000";
        
        proxy_pass $backend_upstream/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Host backend.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        # Allow Firebase Auth popups to communicate back to the site
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    }
}
