version: '3.8'

services:
  # ============================================================================
  # Main FastAPI Application - Serves trending data
  # ============================================================================
  youtube-trending-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-trending-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # YouTube API Configuration
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Persist data between restarts
      - ./storage:/app/storage
      - ./output:/app/output
      - ./logs:/app/logs
      # Mount credentials (read-only)
      - ./credentials.json:/app/credentials.json:ro
    restart: unless-stopped
    networks:
      - youtube-trending-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Optional: Scheduler Service - Runs pipeline daily at 03:00 UTC
  # Uncomment to enable automated daily pipeline execution
  # ============================================================================
  # youtube-trending-scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.scheduler
  #   container_name: youtube-trending-scheduler
  #   environment:
  #     YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
  #     GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID}
  #     SCHEDULE: "0 3 * * *"  # Daily at 03:00 UTC
  #   volumes:
  #     - ./storage:/app/storage
  #     - ./output:/app/output
  #     - ./logs:/app/logs
  #     - ./credentials.json:/app/credentials.json:ro
  #   networks:
  #     - youtube-trending-network
  #   depends_on:
  #     - youtube-trending-api
  #   restart: unless-stopped

networks:
  youtube-trending-network:
    driver: bridge

volumes:
  storage:
  output:
  logs:
